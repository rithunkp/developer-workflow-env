name: developer-workflow-env
version: "1.0.0"
description: >
  Real-world developer workflow environment covering CSV data triage,
  support email classification, and Python code review with security analysis.
tasks:
  - name: data-triage-easy
    difficulty: easy
    max_steps: 1
    reward_range: [0.0, 1.0]
  - name: email-triage-medium
    difficulty: medium
    max_steps: 30
    reward_range: [0.0, 1.0]
  - name: code-review-hard
    difficulty: hard
    max_steps: 40
    reward_range: [0.0, 1.0]
tags:
  - openenv
  - data-quality
  - nlp
  - code-review
